<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradingView Style</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./app.js"></script>
<style>
body{margin:0;background:#0f172a;color:#e2e8f0;font-family:Inter,"Microsoft JhengHei",sans-serif}
.wrap{max-width:1400px;margin:auto;padding:20px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.title{font-size:28px;font-weight:700}
.sub{color:#94a3b8}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:16px}
.num{font-size:32px;font-weight:700;margin-top:10px}
.row{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
.depth-switch{display:flex;gap:8px;margin:12px 0}
.depth-switch button{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:10px;padding:8px 14px;cursor:pointer}
.depth-switch .active{background:#2563eb;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{padding:11px;text-align:center;border-bottom:1px solid #1f2937}
.up{color:#22c55e}
@media(max-width:960px){.kpis,.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="title">Ruicheng Tea Garden / Market View</div>
      <div class="sub" id="meta">Loading...</div>
    </div>
    <div class="sub">LIVE JSON FEED</div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="row">
    <div class="card">
      <h3>Station Board</h3>
      <div id="depthBox"></div>
      <table>
        <thead><tr><th>站點</th><th>土溫</th><th>含水</th><th>N</th><th>P</th><th>K</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card">
      <h3>Moisture Index</h3>
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<script>
let chart;
function render(data, depth="Surface"){
  document.getElementById("meta").textContent = `Last ${data.time} ｜ ${data.weather.location} ｜ ${data.weather.weather}`;
  document.getElementById("kpis").innerHTML = `
    <div class="card"><div class="sub">Tea Temp</div><div class="num">${data.teaAir.temp}<span class="up"> °C</span></div></div>
    <div class="card"><div class="sub">Tea Humidity</div><div class="num">${data.teaAir.humidity}<span class="up"> %</span></div></div>
    <div class="card"><div class="sub">Weather Temp</div><div class="num">${data.weather.airTemp}<span class="up"> °C</span></div></div>
    <div class="card"><div class="sub">Rainfall</div><div class="num">${data.weather.precip}<span class="up"> mm</span></div></div>
  `;
  document.getElementById("depthBox").innerHTML = makeDepthButtons(depth);
  document.getElementById("tbody").innerHTML = stationTableRows(data.stations[depth]);
  bindDepthButtons(d => render(data, d));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.stations[depth].map(s=>s.name),
      datasets:[{
        label:"含水率",
        data:data.stations[depth].map(s=>s.soilMoisture),
        borderColor:"#22c55e",
        backgroundColor:"rgba(34,197,94,.18)",
        fill:true,
        tension:.35
      }]
    },
    options:{plugins:{legend:{display:false}}}
  });
}
loadTeaData().then(d=>render(d));
</script>
</body>
</html>
